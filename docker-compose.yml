services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: property-listing-app
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    depends_on:
      migrate:
        condition: service_completed_successfully

  db:
    image: postgres:16-alpine
    container_name: property-listing-db
    environment:
      POSTGRES_DB: property_listing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d property_listing"]
      interval: 2s
      timeout: 5s
      retries: 30

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: property-listing-migrate
    command: php artisan migrate --force
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: property-listing-queue
    command: php artisan queue:work --queue=property-images --sleep=1 --tries=3 -v
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:

