version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: property-listing-app
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: property-listing-db
    environment:
      POSTGRES_DB: property_listing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: property-listing-queue
    command: php artisan queue:work --queue=property-images --sleep=1 --tries=3 -v
    volumes:
      - .:/var/www/html
    depends_on:
      - db

volumes:
  pgdata:

